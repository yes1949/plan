<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>新概念2 动态学习计划</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
            overscroll-behavior-x: none; 
        }
        h1 {
            text-align: center;
            font-size: 3em;
            color: #333;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .tabs {
            text-align: center;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 12px 35px;
            font-size: 1.3em;
            cursor: pointer;
            border: none;
            background-color: #ddd;
            margin: 0 10px;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }
        .tab-btn.active { background-color: #4CAF50; color: white; }
        
        /* TODAY 页面样式 */
        #today-view {
            max-width: 770px;
            margin: 0 auto;
        }
        .card-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-size: 1.5em;
            line-height: 2.2;
            position: relative;
            margin-bottom: 25px;
        }
        
        .today-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .today-date { color: black; font-weight: bold; font-size: 1.8em; }
        
        #btn-skip {
            background-color: #ff4757; color: white; border: none; padding: 10px 18px;
            font-size: 1.1em;
            border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        #btn-skip:hover { background-color: #ff6b81; }
        
        .row-item {
            margin-bottom: 20px; display: flex; align-items: center;
            padding: 10px; border-radius: 8px; transition: 0.2s;
        }
        .row-item:hover { background-color: #f5f5f5; }
        
        .label { width: 95px; color: #666; font-size: 1.1em; }
        .lesson-text { flex: 4.2; font-weight: bold; transition: 0.3s; }
        
        .type-new { color: red; }
        .type-rev { color: orange; }
        
        /* 状态样式：延迟状态为下划线 */
        .status-done { color: green !important; }
        .status-delayed { text-decoration: underline !important; color: #aaa !important; }
        
        /* 动作按钮 */
        .action-btns { display: flex; gap: 10px; margin-left: 10px; }
        .btn-act {
            padding: 8px 20px; border: 1px solid #ddd; background: white;
            border-radius: 5px; cursor: pointer; color: #666; font-size: 1em; font-weight: bold; transition: 0.2s;
        }
        .btn-act:hover { background: #eee; }
        .btn-act.active-done { background: #4CAF50; color: white; border-color: #4CAF50; }
        .btn-act.active-delay { background: #ff4757; color: white; border-color: #ff4757; }

        /* TODO 页面样式 */
        #todo-view { display: none; max-width: 1000px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; background-color: #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); font-size: 1.1em;}
        th, td { border: 1px solid #eaeaea; padding: 15px 12px; text-align: left; }
        th { background-color: #4CAF50; color: white; position: sticky; top: 0; z-index: 10; }
        
        .tbl-past td { color: #2e8b57; } 
        .tbl-today td { color: #ff8c00; font-weight: bold; background-color: #fff8eb; }
        .tbl-future td { color: #b0b0b0; }
        
        .skipped-msg { text-align: center; color: #ff4757; padding: 40px 0; font-weight: bold; font-size: 1.3em; }
        .btn-resume {
            margin-top: 25px; background-color: #4CAF50; color: white; border: none;
            padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 1.1em; font-weight: bold;
        }
        .btn-resume:hover { background-color: #45a049; }
        
        /* 底部版本号样式 */
        .version-footer {
            text-align: center;
            color: #aaa;
            font-size: 1em;
            margin-top: 30px;
            border-top: 1px dashed #eee;
            padding-top: 15px;
        }

        /* 昨日卡片特定样式 */
        #yesterday-card {
            border-left: 6px solid #b0b0b0;
            background: #fdfdfd;
        }
        .y-header-text {
            color: #888;
            font-size: 1.1em;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>just do it.</h1>
    
    <div class="tabs">
        <button id="btn-today" class="tab-btn active" onclick="switchTab('today')">TODAY</button>
        <button id="btn-todo" class="tab-btn" onclick="switchTab('todo')">TODO</button>
    </div>

    <div id="today-view">
        <div class="card-container" id="today-card">
            <div class="today-header">
                <div class="today-date" id="display-date"></div>
                <button id="btn-skip" onclick="skipToday()">Not Today</button>
            </div>
            <div id="today-content"></div>
        </div>

        <div class="card-container" id="yesterday-card" style="display: none;">
        </div>

        <div class="version-footer">v3.3</div>
    </div>

    <div id="todo-view">
        <table>
            <thead>
                <tr>
                    <th style="width:120px;text-align:center;">日期</th>
                    <th style="width:250px;">学习</th>
                    <th>复习</th>
                </tr>
            </thead>
            <tbody id="todo-body">
            </tbody>
        </table>
    </div>

    <script>
        const titles = [
            "", "L1. A private conversation", "L2. Breakfast or lunch?", "L3. Please send me a card", "L4. An exciting trip", "L5. No wrong numbers", "L6. Percy Buttons", "L7. Too late", "L8. The best and the worst", "L9. A cold welcome", "L10. Not for jazz",
            "L11. One good turn deserves another", "L12. Goodbye and good luck", "L13. The Greenwood Boys", "L14. Do you speak English?", "L15. Good news", "L16. A polite request", "L17. Always young", "L18. He often does this!", "L19. Sold out", "L20. One man in a boat",
            "L21. Mad or not?", "L22. A glass envelope", "L23. A new house", "L24. It could be worse", "L25. Do the English speak English?", "L26. The best art critics", "L27. A wet night", "L28. No parking", "L29. Taxi!", "L30. Football or polo?",
            "L31. Success story", "L32. Shopping made easy", "L33. Out of the darkness", "L34. Quick work", "L35. Stop thief!", "L36. Across the Channel", "L37. The Olympic Games", "L38. Everything except the weather", "L39. Am I all right?", "L40. Food and talk",
            "L41. Do you call that a hat?", "L42. Not very musical", "L43. Over the South Pole", "L44. Through the forest", "L45. A clear conscience", "L46. Expensive and uncomfortable", "L47. A thirsty ghost", "L48. Did you want to tell me something?", "L49. The end of a dream", "L50. Taken for a ride",
            "L51. Reward for virtue", "L52. A pretty carpet", "L53. Hot snake", "L54. Sticky fingers", "L55. Not a gold mine", "L56. Faster than sound", "L57. Can I help you, madam?", "L58. A blessing in disguise", "L59. In or out?", "L60. The future",
            "L61. Trouble with the Hubble", "L62. After the fire", "L63. She was not amused", "L64. The Channel Tunnel", "L65. Jumbo versus the police", "L66. Sweet as honey!", "L67. Volcanoes", "L68. Persistent", "L69. But not murder!", "L70. Red for danger",
            "L71. A famous clock", "L72. A car called Bluebird", "L73. The record-holder", "L74. Out of the limelight", "L75. SOS", "L76. April Fools' Day", "L77. A successful operation", "L78. The last one?", "L79. By air", "L80. The Crystal Palace",
            "L81. Escape", "L82. Monster or fish?", "L83. After the elections", "L84. On strike", "L85. Never too old to learn", "L86. Out of control", "L87. A perfect alibi", "L88. Trapped in a mine", "L89. A slip of the tongue", "L90. What's for supper?",
            "L91. Three men in a basket", "L92. Asking for trouble", "L93. A noble gift", "L94. Future champions", "L95. A fantasy", "L96. The dead return."
        ];
        const deltas = [1, 2, 4, 7, 15, 30, 60, 90, 120];

        function getFormatDate(dateObj) {
            let y = dateObj.getFullYear();
            let m = String(dateObj.getMonth() + 1).padStart(2, '0');
            let d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}${m}${d}`;
        }

        function getDisplayDate(dateObj) {
            let y = dateObj.getFullYear();
            let m = String(dateObj.getMonth() + 1).padStart(2, '0');
            let d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}年${m}月${d}日`;
        }
        
        function parseDate(dateStr) {
            return new Date(dateStr.substring(0,4), parseInt(dateStr.substring(4,6))-1, dateStr.substring(6,8));
        }

        let appData = {};
        let todayTasksList = { newL: "", revs: [] };

        function initApp() {
            // 启用 V7 隔离存储，彻底解决数据错乱问题
            let saved = localStorage.getItem('nCE2PlanDataV7');
            let todayObj = new Date();
            let todayStr = getFormatDate(todayObj);

            if (saved) {
                appData = JSON.parse(saved);
                if (!appData.skippedDates) appData.skippedDates = [];
                if (!appData.currentTasks) appData.currentTasks = { newL: "", revs: [] };
            } else {
                appData = {
                    learnedData: {
                        "L1. A private conversation": "20260312",
                        "L2. Breakfast or lunch?": "20260313",
                        "L3. Please send me a card": "20260314",
                        "L4. An exciting trip": "20260315" // 🔥 精准补齐昨天(3月15日)的进度
                    },
                    newLessonIndex: 5, // 🔥 修正：今天(3月16日)应该是 L5 
                    carryoverReviews: [],
                    lastUpdateDate: todayStr,
                    todayState: { newLesson: "", reviews: {} },
                    skippedDates: [],
                    currentTasks: { newL: "", revs: [] },
                    yesterdaySnap: null 
                };
            }

            // ====== 跨日结算与备份逻辑 ======
            if (appData.lastUpdateDate && appData.lastUpdateDate !== todayStr) {
                let isLastDateSkipped = appData.skippedDates.includes(appData.lastUpdateDate);
                let hadTaskYesterday = (appData.todayState.newLesson && appData.todayState.newLesson !== "") || Object.keys(appData.todayState.reviews).length > 0;
                
                let actedYesterday = false;
                if (appData.todayState.newLesson === "done" || appData.todayState.newLesson === "delayed") actedYesterday = true;
                for (let k in appData.todayState.reviews) {
                    if (appData.todayState.reviews[k] === "done" || appData.todayState.reviews[k] === "delayed") {
                        actedYesterday = true;
                        break;
                    }
                }

                let yesterdayDateObj = new Date(todayObj.getTime() - 86400000);
                let strictlyYesterdayStr = getFormatDate(yesterdayDateObj);
                
                if (appData.lastUpdateDate === strictlyYesterdayStr) {
                    appData.yesterdaySnap = {
                        date: appData.lastUpdateDate,
                        tasks: JSON.parse(JSON.stringify(appData.currentTasks)),
                        state: JSON.parse(JSON.stringify(appData.todayState)),
                        autoSkipped: (hadTaskYesterday && !actedYesterday && !isLastDateSkipped)
                    };
                } else {
                    appData.yesterdaySnap = null;
                }

                if (hadTaskYesterday && !actedYesterday && !isLastDateSkipped) {
                    appData.skippedDates.push(appData.lastUpdateDate);
                    isLastDateSkipped = true; 
                }

                if (!isLastDateSkipped) {
                    if (appData.todayState.newLesson === "done") {
                        if (appData.newLessonIndex <= 96) {
                            appData.learnedData[titles[appData.newLessonIndex]] = appData.lastUpdateDate;
                            appData.newLessonIndex++;
                        }
                    }
                    for (let revLesson in appData.todayState.reviews) {
                        if (appData.todayState.reviews[revLesson] !== "done") {
                            if (!appData.carryoverReviews.includes(revLesson)) {
                                appData.carryoverReviews.push(revLesson);
                            }
                        } else {
                            appData.carryoverReviews = appData.carryoverReviews.filter(item => item !== revLesson);
                        }
                    }
                }
                
                appData.lastUpdateDate = todayStr;
                appData.todayState = { newLesson: "", reviews: {} };
                appData.currentTasks = { newL: "", revs: [] }; 
                saveData();
            }

            generateTodayTasks(todayObj);
            renderToday(todayObj);
            renderTodo(todayObj);
            initSwipeGestures(); 
        }

        function saveData() {
            localStorage.setItem('nCE2PlanDataV7', JSON.stringify(appData));
        }

        function calculateEffectiveDiff(startStr, endStr) {
            let sDate = parseDate(startStr);
            let eDate = parseDate(endStr);
            let diffCal = Math.round((eDate - sDate) / (1000 * 60 * 60 * 24));
            let skipCount = 0;
            appData.skippedDates.forEach(dStr => {
                let dDate = parseDate(dStr);
                if(dDate > sDate && dDate <= eDate) skipCount++;
            });
            return diffCal - skipCount;
        }

        function generateTodayTasks(todayObj) {
            todayTasksList = { newL: "", revs: [] };
            let todayStr = getFormatDate(todayObj);
            
            if (appData.skippedDates.includes(todayStr)) return;

            todayTasksList.newL = appData.newLessonIndex <= 96 ? titles[appData.newLessonIndex] : "";
            if (todayTasksList.newL && (!appData.todayState.newLesson || appData.todayState.newLesson === "")) {
                appData.todayState.newLesson = "pending";
            }

            todayTasksList.revs = [...appData.carryoverReviews];
            
            for (let lesson in appData.learnedData) {
                let diffDays = calculateEffectiveDiff(appData.learnedData[lesson], todayStr);
                if (deltas.includes(diffDays)) {
                    if (!todayTasksList.revs.includes(lesson)) {
                        todayTasksList.revs.push(lesson);
                    }
                }
            }

            todayTasksList.revs.forEach(rev => {
                if (!appData.todayState.reviews[rev]) {
                    appData.todayState.reviews[rev] = "pending";
                }
            });

            appData.currentTasks = {
                newL: todayTasksList.newL,
                revs: [...todayTasksList.revs]
            };

            saveData();
        }

        // ==========================================
        //  状态交互逻辑
        // ==========================================
        function skipToday() {
            if(confirm("确定要启动 Not Today 模式吗？\n今日任务将全面隐藏，学习与复习计划将整体完美顺延一天。")) {
                let todayStr = getFormatDate(new Date());
                if(!appData.skippedDates.includes(todayStr)) {
                    appData.skippedDates.push(todayStr);
                }
                appData.todayState.newLesson = "skipped";
                for(let k in appData.todayState.reviews) {
                    appData.todayState.reviews[k] = "skipped";
                }
                saveData();
                renderToday(new Date());
                renderTodo(new Date());
            }
        }

        function resumeToday() {
            let todayStr = getFormatDate(new Date());
            appData.skippedDates = appData.skippedDates.filter(d => d !== todayStr);
            appData.todayState.newLesson = "";
            appData.todayState.reviews = {};
            saveData();
            generateTodayTasks(new Date());
            renderToday(new Date());
            renderTodo(new Date());
        }

        function updateStatus(type, name, targetStatus) {
            let currentStatus = type === 'new' ? appData.todayState.newLesson : appData.todayState.reviews[name];
            let finalStatus = (currentStatus === targetStatus) ? "pending" : targetStatus;

            if (type === 'new') appData.todayState.newLesson = finalStatus;
            else appData.todayState.reviews[name] = finalStatus;
            
            saveData();
            renderToday(new Date());
            renderTodo(new Date());
        }

        // ====== 核心：昨天卡片补录交互 ======
        function updateYesterdayStatus(type, name, targetStatus) {
            let yState = appData.yesterdaySnap.state;
            let currentStatus = type === 'new' ? yState.newLesson : yState.reviews[name];
            let finalStatus = (currentStatus === targetStatus) ? "pending" : targetStatus;

            let wasDone = (currentStatus === 'done');
            let isDone = (finalStatus === 'done');

            if (type === 'new') {
                yState.newLesson = finalStatus;
                if (wasDone && !isDone) {
                    delete appData.learnedData[appData.yesterdaySnap.tasks.newL];
                    appData.newLessonIndex--;
                } else if (!wasDone && isDone) {
                    appData.learnedData[appData.yesterdaySnap.tasks.newL] = appData.yesterdaySnap.date;
                    appData.newLessonIndex++;
                }
            } else {
                yState.reviews[name] = finalStatus;
                if (wasDone && !isDone) {
                    if (!appData.carryoverReviews.includes(name)) appData.carryoverReviews.push(name);
                } else if (!wasDone && isDone) {
                    appData.carryoverReviews = appData.carryoverReviews.filter(n => n !== name);
                }
            }
            
            saveData();
            generateTodayTasks(new Date());
            renderToday(new Date());
            renderTodo(new Date());
        }

        function restoreYesterdayAutoSkip() {
            appData.skippedDates = appData.skippedDates.filter(d => d !== appData.yesterdaySnap.date);
            appData.yesterdaySnap.autoSkipped = false;
            appData.yesterdaySnap.tasks.revs.forEach(r => {
                if(!appData.carryoverReviews.includes(r)) appData.carryoverReviews.push(r);
            });
            saveData();
            generateTodayTasks(new Date());
            renderToday(new Date());
            renderTodo(new Date());
        }

        // ==========================================
        //  渲染视图
        // ==========================================
        function renderToday(todayObj) {
            document.getElementById('display-date').textContent = getDisplayDate(todayObj);
            let contentDiv = document.getElementById('today-content');
            let yesterdayCard = document.getElementById('yesterday-card');
            let todayStr = getFormatDate(todayObj);
            
            // --- 渲染昨天卡片 ---
            let strictlyYesterdayStr = getFormatDate(new Date(todayObj.getTime() - 86400000));
            if (appData.yesterdaySnap && appData.yesterdaySnap.date === strictlyYesterdayStr) {
                yesterdayCard.style.display = 'block';
                let yDateShow = `${strictlyYesterdayStr.substring(4,6)}月${strictlyYesterdayStr.substring(6,8)}日`;
                
                let yHtml = `
                    <div class="today-header" style="border-bottom: 1px dashed #ccc;">
                        <div class="y-header-text">昨日补录 (${yDateShow})</div>
                    </div>`;

                if (appData.yesterdaySnap.autoSkipped) {
                    yHtml += `
                        <div class="skipped-msg" style="padding: 15px 0; font-size: 1em; color: #d9534f;">
                            ⚠️ 因昨日未操作，进度已自动顺延<br>
                            <button class="btn-resume" style="margin-top:15px; padding: 8px 15px; font-size: 0.9em; background:#aaa;" onclick="restoreYesterdayAutoSkip()">
                                取消顺延，我要补录昨日进度
                            </button>
                        </div>`;
                } else {
                    let yTasks = appData.yesterdaySnap.tasks;
                    let yState = appData.yesterdaySnap.state;

                    if (yTasks.newL) {
                        let status = yState.newLesson;
                        let textClass = "lesson-text type-new";
                        let btnDoneClass = "btn-act"; let btnDelayClass = "btn-act";
                        if (status === 'done') { textClass += " status-done"; btnDoneClass += " active-done"; }
                        if (status === 'delayed') { textClass += " status-delayed"; btnDelayClass += " active-delay"; }
                        yHtml += `
                            <div class="row-item" style="background:#f4f4f4;">
                                <div class="label">新学习</div>
                                <div class="${textClass}">${yTasks.newL}</div>
                                <div class="action-btns">
                                    <button class="${btnDoneClass}" onclick="updateYesterdayStatus('new', '', 'done')">完成</button>
                                    <button class="${btnDelayClass}" onclick="updateYesterdayStatus('new', '', 'delayed')">延迟</button>
                                </div>
                            </div>`;
                    }
                    yTasks.revs.forEach((rev, index) => {
                        let status = yState.reviews[rev];
                        let textClass = "lesson-text type-rev";
                        let btnDoneClass = "btn-act"; let btnDelayClass = "btn-act";
                        if (status === 'done') { textClass += " status-done"; btnDoneClass += " active-done"; }
                        if (status === 'delayed') { textClass += " status-delayed"; btnDelayClass += " active-delay"; }
                        yHtml += `
                            <div class="row-item" style="background:#f4f4f4;">
                                <div class="label">${index === 0 ? '待复习' : ''}</div>
                                <div class="${textClass}">${rev}</div>
                                <div class="action-btns">
                                    <button class="${btnDoneClass}" onclick="updateYesterdayStatus('rev', '${rev}', 'done')">完成</button>
                                    <button class="${btnDelayClass}" onclick="updateYesterdayStatus('rev', '${rev}', 'delayed')">延迟</button>
                                </div>
                            </div>`;
                    });
                    if(!yTasks.newL && yTasks.revs.length === 0) {
                        yHtml += "<div style='color:#999; margin-top:10px; font-size: 0.9em;'>昨日无学习安排。</div>";
                    }
                }
                yesterdayCard.innerHTML = yHtml;
            } else {
                yesterdayCard.style.display = 'none';
            }

            // --- 渲染今天卡片 ---
            if (appData.skippedDates.includes(todayStr)) {
                contentDiv.innerHTML = `
                    <div class="skipped-msg">
                        ☕️ 今日已开启免打扰休息模式<br><br>
                        <span style="font-size:0.8em;color:#888;">记忆曲线不受影响，所有计划已自动顺延一天。</span><br><br>
                        <button class="btn-resume" onclick="resumeToday()">Yes Today! (恢复今日计划)</button>
                    </div>`;
                document.getElementById('btn-skip').style.display = 'none';
                return;
            } else {
                document.getElementById('btn-skip').style.display = 'inline-block';
            }

            contentDiv.innerHTML = "";

            if (todayTasksList.newL) {
                let status = appData.todayState.newLesson;
                let textClass = "lesson-text type-new";
                let btnDoneClass = "btn-act";
                let btnDelayClass = "btn-act";

                if (status === 'done') { textClass += " status-done"; btnDoneClass += " active-done"; }
                if (status === 'delayed') { textClass += " status-delayed"; btnDelayClass += " active-delay"; }

                contentDiv.innerHTML += `
                    <div class="row-item">
                        <div class="label">新学习</div>
                        <div class="${textClass}">${todayTasksList.newL}</div>
                        <div class="action-btns">
                            <button class="${btnDoneClass}" onclick="updateStatus('new', '', 'done')">完成</button>
                            <button class="${btnDelayClass}" onclick="updateStatus('new', '', 'delayed')">延迟</button>
                        </div>
                    </div>
                `;
            }

            todayTasksList.revs.forEach((rev, index) => {
                let status = appData.todayState.reviews[rev];
                let textClass = "lesson-text type-rev";
                let btnDoneClass = "btn-act";
                let btnDelayClass = "btn-act";

                if (status === 'done') { textClass += " status-done"; btnDoneClass += " active-done"; }
                if (status === 'delayed') { textClass += " status-delayed"; btnDelayClass += " active-delay"; }

                contentDiv.innerHTML += `
                    <div class="row-item">
                        <div class="label">${index === 0 ? '待复习' : ''}</div>
                        <div class="${textClass}">${rev}</div>
                        <div class="action-btns">
                            <button class="${btnDoneClass}" onclick="updateStatus('rev', '${rev}', 'done')">完成</button>
                            <button class="${btnDelayClass}" onclick="updateStatus('rev', '${rev}', 'delayed')">延迟</button>
                        </div>
                    </div>
                `;
            });

            if(!todayTasksList.newL && todayTasksList.revs.length === 0) {
                 contentDiv.innerHTML = "<div style='color:#666; margin-top:20px;'>今天没有任何排期，自由安排！</div>";
            }
        }

        function renderTodo(todayObj) {
            let tbody = document.getElementById('todo-body');
            tbody.innerHTML = "";
            let todayStr = getFormatDate(todayObj);

            let startDate = new Date(2026, 2, 12); 
            let simDateObj = new Date(startDate);
            
            let simIndex = appData.newLessonIndex;
            let simLearned = JSON.parse(JSON.stringify(appData.learnedData));
            
            let delayNew = false;
            let delayedRevs = [];
            let todayIsSkipped = appData.skippedDates.includes(todayStr);

            if (!todayIsSkipped) {
                if (appData.todayState.newLesson === "delayed") delayNew = true;
                for (let k in appData.todayState.reviews) {
                    if (appData.todayState.reviews[k] === "delayed") {
                        delayedRevs.push(k);
                    }
                }
            }

            let pureTodayTime = new Date(todayObj.getFullYear(), todayObj.getMonth(), todayObj.getDate()).getTime();
            let tomorrowStr = getFormatDate(new Date(todayObj.getTime() + 86400000));
            
            let emptyDays = 0;
            let safeGuardCount = 0;

            while (true) {
                safeGuardCount++;
                if (safeGuardCount > 400) break;

                let dStr = getFormatDate(simDateObj);
                let pureSimTime = new Date(simDateObj.getFullYear(), simDateObj.getMonth(), simDateObj.getDate()).getTime();
                
                let sNew = "";
                let sRevs = [];
                let revOut = "";
                let rowClass = "";

                if (pureSimTime < pureTodayTime) {
                    rowClass = "tbl-past";
                    if (appData.skippedDates.includes(dStr)) {
                        sNew = "☕️ 休息日";
                        revOut = "---";
                    } else {
                        for (let lesson in appData.learnedData) {
                            if (appData.learnedData[lesson] === dStr) {
                                sNew = lesson;
                                break;
                            }
                        }
                        for (let lesson in appData.learnedData) {
                            let lDateStr = appData.learnedData[lesson];
                            if (lDateStr >= dStr) continue;
                            let diffDays = calculateEffectiveDiff(lDateStr, dStr);
                            if (deltas.includes(diffDays)) sRevs.push(lesson);
                        }
                        revOut = sRevs.length > 0 ? sRevs.join("，") : "无";
                    }
                } 
                else if (pureSimTime === pureTodayTime) {
                    rowClass = "tbl-today";
                    if (todayIsSkipped) {
                        sNew = "☕️ 今日休息 (计划顺延)";
                        revOut = "---";
                    } else {
                        sNew = todayTasksList.newL;
                        sRevs = [...todayTasksList.revs];
                        
                        if (!delayNew && sNew && (appData.todayState.newLesson === "done" || appData.todayState.newLesson === "pending")) {
                            simLearned[sNew] = dStr;
                            simIndex++;
                        }
                        
                        let sNewHtml = sNew;
                        if (delayNew && sNewHtml) {
                            sNewHtml = `<span style="text-decoration:underline;color:#aaa">${sNewHtml}</span>`;
                        }
                        
                        let formattedRevs = [];
                        sRevs.forEach(r => {
                            if (delayedRevs.includes(r)) {
                                formattedRevs.push(`<span style="text-decoration:underline;color:#aaa">${r}</span>`);
                            } else if (appData.carryoverReviews.includes(r)) {
                                formattedRevs.push(`<span style="text-decoration:underline;">${r}</span>`);
                            } else {
                                formattedRevs.push(r);
                            }
                        });
                        
                        sNew = sNewHtml;
                        revOut = formattedRevs.length > 0 ? formattedRevs.join("，") : "无";
                    }
                } 
                else {
                    rowClass = "tbl-future";
                    if (appData.skippedDates.includes(dStr)) {
                        sNew = "☕️ 休息日 (预设)";
                        revOut = "---";
                    } else {
                        if (simIndex <= 96) {
                            sNew = titles[simIndex];
                            simLearned[sNew] = dStr;
                            simIndex++;
                        }
                        for (let lesson in simLearned) {
                            let lDateStr = simLearned[lesson];
                            if (lDateStr >= dStr) continue;
                            let diffDays = calculateEffectiveDiff(lDateStr, dStr);
                            if (deltas.includes(diffDays)) {
                                if (!sRevs.includes(lesson)) sRevs.push(lesson);
                            }
                        }
                        if (dStr === tomorrowStr && delayedRevs.length > 0) {
                            sRevs = [...new Set([...sRevs, ...delayedRevs])];
                        }
                        
                        if (dStr === tomorrowStr && delayNew && sNew) {
                            sNew = `<span style="text-decoration:underline;">${sNew}</span>`;
                        }
                        let formattedRevs = [];
                        sRevs.forEach(r => {
                            if (dStr === tomorrowStr && delayedRevs.includes(r)) {
                                formattedRevs.push(`<span style="text-decoration:underline;">${r}</span>`);
                            } else {
                                formattedRevs.push(r);
                            }
                        });
                        
                        revOut = formattedRevs.length > 0 ? formattedRevs.join("，") : "无";
                    }
                }

                if (pureSimTime > pureTodayTime) {
                    if (!sNew && (!sRevs || sRevs.length === 0) && simIndex > 96) {
                        emptyDays++;
                        if (emptyDays > 5) break; 
                    } else {
                        emptyDays = 0;
                    }
                }

                let tr = document.createElement('tr');
                tr.className = rowClass;
                if (pureSimTime === pureTodayTime) {
                    tr.id = "anchor-today";
                }
                tr.innerHTML = `
                    <td style="text-align:center;font-family:monospace;">${dStr}</td>
                    <td>${sNew || "无"}</td>
                    <td>${revOut}</td>
                `;
                tbody.appendChild(tr);
                simDateObj.setDate(simDateObj.getDate() + 1);
            }
        }

        // ==========================================
        //  手势滑动与页面切换逻辑
        // ==========================================
        let currentTab = 'today';
        
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('btn-today').className = 'tab-btn' + (tab === 'today' ? ' active' : '');
            document.getElementById('btn-todo').className = 'tab-btn' + (tab === 'todo' ? ' active' : '');
            document.getElementById('today-view').style.display = tab === 'today' ? 'block' : 'none';
            document.getElementById('todo-view').style.display = tab === 'todo' ? 'block' : 'none';
            
            if (tab === 'todo') {
                setTimeout(() => {
                    let anchor = document.getElementById('anchor-today');
                    if(anchor) {
                        let headerOffset = 60 + 200; 
                        let elementPosition = anchor.getBoundingClientRect().top;
                        let offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                        window.scrollTo({ top: offsetPosition, behavior: "smooth" });
                    }
                }, 100);
            }
        }

        function initSwipeGestures() {
            let touchstartX = 0;
            let touchendX = 0;
            let touchstartY = 0;
            let touchendY = 0;

            document.addEventListener('touchstart', function(event) {
                touchstartX = event.changedTouches[0].screenX;
                touchstartY = event.changedTouches[0].screenY;
            }, {passive: true});

            document.addEventListener('touchend', function(event) {
                touchendX = event.changedTouches[0].screenX;
                touchendY = event.changedTouches[0].screenY;
                handleSwipe();
            }, {passive: true});

            function handleSwipe() {
                let xDiff = touchendX - touchstartX;
                let yDiff = touchendY - touchstartY;

                if (Math.abs(xDiff) > Math.abs(yDiff) && Math.abs(xDiff) > 60) {
                    if (xDiff < 0 && currentTab === 'today') {
                        switchTab('todo');
                    } else if (xDiff > 0 && currentTab === 'todo') {
                        switchTab('today');
                    }
                }
            }
        }

        // ==========================================
        // 初始化应用
        // ==========================================
        window.onload = initApp;

        // ==========================================
        // PWA Service Worker 注册代码
        // ==========================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => console.log('SW 注册成功', registration.scope))
                    .catch(err => console.log('SW 注册失败', err));
            });
        }

    </script>
</body>
</html>
